<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g transform="translate(256,256)">
    <!-- Bar -->
    <rect x="-120" y="-8" width="240" height="16" rx="8" fill="url(#accent)"/>
    <!-- Left weight -->
    <rect x="-155" y="-45" width="35" height="90" rx="8" fill="url(#accent)"/>
    <rect x="-170" y="-55" width="20" height="110" rx="6" fill="url(#accent)" opacity="0.7"/>
    <!-- Right weight -->
    <rect x="120" y="-45" width="35" height="90" rx="8" fill="url(#accent)"/>
    <rect x="150" y="-55" width="20" height="110" rx="6" fill="url(#accent)" opacity="0.7"/>
  </g>
  <!-- IL text -->
  <text x="256" y="400" font-family="system-ui, sans-serif" font-size="64" font-weight="800" fill="#f1f5f9" text-anchor="middle" letter-spacing="8">IRONLOG</text>
</svg>
